server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: ai-essay-grading-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/essay_grading}
    username: ${POSTGRES_USER:essay_grading_user}
    password: ${POSTGRES_PASSWORD:essay_grading_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
